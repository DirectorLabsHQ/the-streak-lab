name: NBA Auto Update

on:
  schedule:
    # Runs at 10:00 AM UTC (approx. 5:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for saving the JSON back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run the script
        # This points to the script inside your folder
        run: python nba-streaks/update_nba.py

      - name: Save results to the repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add nba-streaks/streak_data.json
          git commit -m "Auto-update NBA Heat Index" || exit 0
          git push
