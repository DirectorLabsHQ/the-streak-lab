name: NBA Streak Lab Daily Sync

on:
  schedule:
    # Runs at 09:00 UTC (4:00 AM EST) every day
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows you to run this manually from the "Actions" tab

jobs:
  deep-scan-update:
    runs-on: ubuntu-latest
    # Increased timeout to 6 hours to handle the Deep Scan logic safely
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Deep Scan Script
        run: python nba-streaks/update_nba.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nba-streaks/streak_data.json
          # Only commit if there are actual changes to the data
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update NBA Heat Index: $(date +'%Y-%m-%d')" && git push)
